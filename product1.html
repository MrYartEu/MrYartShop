<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrYartEu - Giant Skittles</title>

<style>
  body {
    font-family: Arial;
    background: #f7f7f7;
    margin: 0;
    padding: 0;
    color: #333;
  }

  header {
    background: #222;
    color: #fff;
    padding: 20px;
    text-align: center;
  }

  header h1 {
    margin: 0;
  }

  /* BIG FULL WHITE BOX */
  .container {
    display: flex;
    max-width: 1000px;
    margin: 40px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    padding: 40px;
    min-height: 600px; /* makes it go further down */
  }

  .left {
    flex: 1;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .left img {
    width: 100%;
    max-width: 400px;
    border-radius: 8px;
  }

  .right {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }

  .right h2 {
    font-size: 2rem;
    margin-bottom: 25px;
  }

  .btn {
    padding: 14px 25px;
    background: #222;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
    display: block;
    margin-bottom: 15px;
    text-align: center;
    font-size: 16px;
  }

  .btn:hover {
    background: #444;
  }

  /* DESCRIPTION NOW UNDER BUTTONS */
  .description {
    margin-top: 20px;
    font-size: 1.05rem;
    line-height: 1.6;
  }

</style>
</head>

<body>

<header>
  <h1>MrYartEu</h1>
</header>

<div class="container">

  <div class="left">
    <img src="product1.jpg" alt="Giant Skittles">
  </div>

  <div class="right">
    <h2>Giant Skittles</h2>

    <a class="btn" href="https://buy.stripe.com/placeholder1" target="_blank">Buy Now</a>
    <a class="btn" href="#" onclick="alert('Added to basket (demo)!')">Add to Basket</a>
    <a class="btn" href="index.html">← Back to Store</a>

    <div class="description">
      Full description of Giant Skittles goes here. Add flavor, size, story,
      ingredients, shipping time, or any details you want your customer to know.
      Make this section longer if you want the white box to stretch further down.
    </div>

  </div>

</div>

</body>
</html>
