<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrYartEu - Giant Skittles</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.main-box {
  max-width: 1200px;
  margin: 60px auto;
  background: white;
  display: flex;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* LEFT SIDE IMAGE */
.left-side {
  flex: 2;
  background: #fafafa;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

.left-side img {
  max-width: 80%;
  max-height: 500px;
  width: auto;
  height: auto;
  display: block;
  object-fit: contain;
}

/* RIGHT SIDE INFO */
.right-side {
  flex: 1;
  padding: 60px 50px;
  display: flex;
  flex-direction: column;
}

.right-side h2 {
  font-size: 32px;
  margin-bottom: 30px;
}

/* BUTTON STYLE */
.button {
  padding: 16px;
  margin-bottom: 15px;
  text-align: center;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
  transition: 0.3s;
}

.button:hover {
  background: #333;
}

/* DESCRIPTION UNDER BUTTONS */
.description {
  margin-top: 30px;
  font-size: 16px;
  line-height: 1.6;
  color: #444;
}

@media (max-width: 900px) {
  .main-box {
    flex-direction: column;
  }

  .left-side {
    padding: 40px;
  }

  .right-side {
    padding: 30px;
  }
}
</style>
</head>

<body>

<header>
  <h1>MrYartEu</h1>
</header>

<div class="main-box">

  <div class="left-side">
    <img src="product1.jpg" alt="Giant Skittles">
  </div>

  <div class="right-side">
    <h2>Giant Skittles</h2>

    <a class="button" href="https://buy.stripe.com/placeholder1" target="_blank">Buy Now</a>

    <a class="button" href="#">Add to Cart</a>

    <a class="button" href="index.html">Return to Store</a>

    <div class="description">
      Giant Skittles with intense fruity flavor and extra crunch.
      Add your full product description here. Include size, weight,
      ingredients, and shipping details.
    </div>

  </div>

</div>

</body>
</html>
