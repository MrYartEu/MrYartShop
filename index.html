<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrYartEu Store</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; color: #333; }
    header { background: #222; color: #fff; padding: 20px 0; text-align: center; }
    header h1 { margin: 0; font-size: 2rem; }
    nav { margin-top: 10px; }
    nav a { color: #fff; text-decoration: none; margin: 0 10px; font-weight: bold; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .gallery { display: flex; flex-wrap: wrap; justify-content: space-around; }
    .product { background: #fff; border: 1px solid #ddd; border-radius: 8px; width: 300px; margin: 15px; text-align: center; padding: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    .product img { width: 100%; height: auto; border-radius: 5px; }
    .product h2 { font-size: 1.2rem; margin: 10px 0; }
    .btn { display: inline-block; padding: 10px 20px; background: #222; color: #fff; text-decoration: none; border-radius: 5px; transition: background 0.3s; }
    .btn:hover { background: #444; }
    footer { text-align: center; padding: 20px 0; background: #222; color: #fff; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>MrYartEu</h1>
    <nav>
      <a href="#store">Store</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <div class="container" id="store">
    <h2 style="text-align:center;">Our Candy Collection</h2>
    <div class="gallery">
      
      <!-- Product 1 -->
      <div class="product">
        <img src="images/store_front.png" alt="Giant Skittles">
        <h2>Giant Skittles</h2>
        <a class="btn" href="product1.html">View / Buy</a>
      </div>

      <!-- Product 2 -->
      <div class="product">
        <img src="images/product2.png" alt="Sour Patch Kids">
        <h2>Sour Patch Kids</h2>
        <a class="btn" href="product2.html">View / Buy</a>
      </div>

      <!-- Product 3 -->
      <div class="product">
        <img src="images/product3.png" alt="Haribo Golden Bears">
        <h2>Haribo Golden Bears</h2>
        <a class="btn" href="product3.html">View / Buy</a>
      </div>

      <!-- Product 4 -->
      <div class="product">
        <img src="images/product4.png" alt="Nerds Rainbow">
        <h2>Nerds Rainbow</h2>
        <a class="btn" href="product4.html">View / Buy</a>
      </div>

      <!-- Product 5 -->
      <div class="product">
        <img src="images/product5.png" alt="Jolly Ranchers">
        <h2>Jolly Ranchers</h2>
        <a class="btn" href="product5.html">View / Buy</a>
      </div>

      <!-- Product 6 -->
      <div class="product">
        <img src="images/product6.png" alt="M&M's Peanut">
        <h2>M&M's Peanut</h2>
        <a class="btn" href="product6.html">View / Buy</a>
      </div>

    </div>
  </div>

  <footer id="contact">
    <p>Contact: youremail@example.com | © 2026 MrYartEu</p>
  </footer>
</body>
</html>
