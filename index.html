<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* VIDEO BACKGROUND */
  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* Dark overlay for readability */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
  }

  header {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    padding: 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  header h1 {
    margin: 0;
    font-size: 2rem;
    flex-basis: 100%;
    text-align: center;
  }

  nav {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    margin: 5px 20px;
    transition: 0.3s;
  }

  nav a:hover {
    color: #ccc;
  }

  nav .left { flex: 1; text-align: left; }
  nav .right { flex: 1; text-align: right; }

  .container {
    max-width: 1200px;
    margin: 30px auto;
    padding: 0 20px;
    flex: 1;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 60px;
    justify-items: center;
    align-items: stretch;
  }

  /* GLASS PRODUCT CARDS */
  .product {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 18px;
    width: 100%;
    max-width: 350px;
    text-align: center;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s ease;
  }

  .product:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  .product img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
  }

  .product h2 {
    font-size: 1.3rem;
    margin: 10px 0 15px 0;
  }

  .btn {
    display: inline-block;
    padding: 10px 20px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
    margin-top: auto;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .btn:hover {
    background: rgba(255,255,255,0.2);
  }

  .coming-soon {
    margin: 80px auto;
    text-align: center;
    font-size: 3rem;
    font-weight: bold;
    font-family: 'Arial Black', sans-serif;
    color: #fff;
  }

  /* GLASS ABOUT US SECTION */
  .about-us {
    max-width: 1200px;
    margin: 40px auto 60px auto;
    padding: 35px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
  }

  footer {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    text-align: center;
    padding: 15px 0;
    font-size: 0.9rem;
  }

  @media(max-width: 1000px) {
    .gallery {
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }
  }

  @media(max-width: 600px) {
    .gallery {
      grid-template-columns: 1fr;
      gap: 30px;
    }
    nav {
      flex-direction: column;
      text-align: center;
    }
    nav .left, nav .right {
      text-align: center;
      margin: 5px 0;
    }
  }

</style>
